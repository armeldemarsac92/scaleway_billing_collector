replicaCount: 1

image:
  repository: ghcr.io/armeldemarsac92/scaleway_billing_collector
  tag: latest
  pullPolicy: IfNotPresent

nameOverride: ""
fullnameOverride: ""

config:
  scwApiUrl: https://api.scaleway.com
  databasePath: /data/billing-collector.sqlite3
  bindHost: 0.0.0.0
  bindPort: 9503
  projectIds: ""
  categoryNames: ""
  previousPeriodBackfillDays: 7
  collectionIntervalSeconds: 3600
  collectOnStart: true

secret:
  create: false
  name: ""
  scwSecretKey: ""
  scwOrganizationId: ""

persistence:
  enabled: true
  existingClaim: ""
  accessModes:
    - ReadWriteOnce
  size: 1Gi
  storageClassName: ""
  annotations: {}

service:
  type: ClusterIP
  port: 9503

serviceMonitor:
  enabled: true
  labels:
    release: kube-prometheus-stack
  interval: 60s
  path: /metrics
  namespaceSelector: {}

podAnnotations: {}
podLabels: {}

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1000
  runAsGroup: 1000
  fsGroup: 1000

securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop:
      - ALL

readinessProbe:
  httpGet:
    path: /readyz
    port: metrics
  periodSeconds: 10

livenessProbe:
  httpGet:
    path: /healthz
    port: metrics
  periodSeconds: 30

resources: {}

nodeSelector: {}
tolerations: []
affinity: {}

extraEnv: []
