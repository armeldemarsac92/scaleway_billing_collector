{{- if .Values.secret.create }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "scaleway-billing-collector.secretName" . }}
  labels:
    {{- include "scaleway-billing-collector.labels" . | nindent 4 }}
type: Opaque
data:
  SCW_SECRET_KEY: {{ required "secret.scwSecretKey is required when secret.create=true" .Values.secret.scwSecretKey | b64enc | quote }}
  SCW_ORGANIZATION_ID: {{ required "secret.scwOrganizationId is required when secret.create=true" .Values.secret.scwOrganizationId | b64enc | quote }}
{{- end }}
